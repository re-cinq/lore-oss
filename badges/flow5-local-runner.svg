<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 580" font-family="system-ui,-apple-system,sans-serif" font-size="13">
  <defs>
    <marker id="arrow5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10z" fill="#64748b"/></marker>
    <filter id="shadow5"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity=".08"/></filter>
  </defs>
  <style>
    .box{filter:url(#shadow5);rx:8}
    .label{font-weight:600;fill:#1e293b}
    .sub{fill:#64748b;font-size:12px}
    .conn{stroke:#64748b;stroke-width:1.5;fill:none;marker-end:url(#arrow5)}
    .step{font-size:11.5px;fill:#334155}
    .mono{font-family:ui-monospace,monospace;font-size:11px;fill:#475569}
    .note{font-size:11px;fill:#64748b;font-style:italic}
  </style>

  <!-- Developer prompt -->
  <rect class="box" x="100" y="20" width="480" height="44" fill="#f8fafc" stroke="#cbd5e1"/>
  <text class="label" x="340" y="40" text-anchor="middle">Developer</text>
  <text class="sub" x="340" y="55" text-anchor="middle">"run locally: add rate limiting to the API"</text>

  <line class="conn" x1="340" y1="64" x2="340" y2="100"/>

  <!-- MCP tool call -->
  <rect class="box" x="150" y="100" width="380" height="36" fill="#f0f4ff" stroke="#818cf8"/>
  <text class="step" x="340" y="123" text-anchor="middle">Claude Code calls <tspan font-family="ui-monospace,monospace" font-size="12">run_task_locally</tspan> (MCP tool)</text>

  <line class="conn" x1="340" y1="136" x2="340" y2="172"/>

  <!-- Background process box -->
  <rect class="box" x="80" y="172" width="520" height="230" fill="#fff" stroke="#94a3b8"/>
  <text class="label" x="340" y="198" text-anchor="middle">Background Claude Code</text>
  <text class="sub" x="340" y="214" text-anchor="middle">(developer's machine — uses subscription, zero API cost)</text>

  <text class="label" x="110" y="244" font-size="12" fill="#6366f1">1.</text>
  <text class="step" x="130" y="244">Creates git worktree (~/.lore/worktrees/)</text>

  <text class="label" x="110" y="268" font-size="12" fill="#6366f1">2.</text>
  <text class="step" x="130" y="268">Spawns <tspan font-family="ui-monospace,monospace" font-size="11">claude --print</tspan> in background</text>

  <text class="label" x="110" y="292" font-size="12" fill="#6366f1">3.</text>
  <text class="step" x="130" y="292">Returns immediately (non-blocking)</text>

  <text class="label" x="110" y="316" font-size="12" fill="#6366f1">4.</text>
  <text class="step" x="130" y="316">Background: implements, commits, pushes</text>

  <text class="label" x="110" y="340" font-size="12" fill="#6366f1">5.</text>
  <text class="step" x="130" y="340">Creates PR via gh CLI</text>

  <text class="label" x="110" y="364" font-size="12" fill="#6366f1">6.</text>
  <text class="step" x="130" y="364">Cleans up worktree</text>

  <!-- Context note -->
  <rect class="box" x="340" y="330" width="240" height="50" fill="#faf5ff" stroke="#c084fc" rx="6"/>
  <text class="note" x="460" y="348" text-anchor="middle">Same context as GKE tasks —</text>
  <text class="note" x="460" y="364" text-anchor="middle">calls assemble_context + search_memory</text>

  <line class="conn" x1="340" y1="402" x2="340" y2="438"/>

  <!-- Developer keeps working -->
  <rect class="box" x="100" y="438" width="480" height="44" fill="#fefce8" stroke="#fde047"/>
  <text class="label" x="340" y="456" text-anchor="middle" fill="#854d0e">Developer keeps working in main session</text>
  <text class="mono" x="340" y="472" text-anchor="middle" fill="#92400e">Statusline: ◉ Lore 1 local</text>

  <line class="conn" x1="340" y1="482" x2="340" y2="518"/>

  <!-- PR result -->
  <rect class="box" x="200" y="518" width="280" height="40" fill="#ecfdf5" stroke="#34d399"/>
  <text class="label" x="340" y="543" text-anchor="middle" fill="#065f46">PR appears when done</text>
</svg>