<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" font-family="system-ui,-apple-system,sans-serif" font-size="13">
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10z" fill="#64748b"/></marker>
    <filter id="shadow2"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity=".08"/></filter>
  </defs>
  <style>
    .box{filter:url(#shadow2);rx:8}
    .label{font-weight:600;fill:#1e293b}
    .sub{fill:#64748b;font-size:12px}
    .conn{stroke:#64748b;stroke-width:1.5;fill:none;marker-end:url(#arrow2)}
    .step{font-size:11.5px;fill:#334155}
    .dim{fill:#64748b;font-size:11.5px}
  </style>

  <!-- Web UI -->
  <rect class="box" x="180" y="20" width="320" height="44" fill="#f8fafc" stroke="#cbd5e1"/>
  <text class="label" x="340" y="40" text-anchor="middle">Web UI</text>
  <text class="sub" x="340" y="55" text-anchor="middle">(lore.gcp.re-cinq.com)</text>

  <line class="conn" x1="340" y1="64" x2="340" y2="96"/>

  <!-- Task description -->
  <rect class="box" x="150" y="96" width="380" height="36" fill="#eff6ff" stroke="#93c5fd"/>
  <text class="step" x="340" y="119" text-anchor="middle">Create task: "write a runbook for incident response"</text>

  <line class="conn" x1="340" y1="132" x2="340" y2="166"/>

  <!-- Lore Agent -->
  <rect class="box" x="80" y="166" width="520" height="320" fill="#fff" stroke="#94a3b8"/>
  <text class="label" x="340" y="192" text-anchor="middle">Lore Agent (GKE)</text>

  <!-- Simple task path -->
  <rect class="box" x="110" y="212" width="230" height="120" fill="#fefce8" stroke="#fde047"/>
  <text class="label" x="225" y="236" text-anchor="middle" fill="#854d0e" font-size="12">Simple task</text>
  <text class="dim" x="225" y="254" text-anchor="middle">(onboard, runbook)</text>
  <text class="step" x="132" y="280">Claude API (Haiku)</text>
  <text class="step" x="132" y="298">Parse output</text>
  <text class="step" x="132" y="316">Create PR</text>

  <!-- Complex task path -->
  <rect class="box" x="370" y="212" width="210" height="120" fill="#fdf2f8" stroke="#f9a8d4"/>
  <text class="label" x="475" y="236" text-anchor="middle" fill="#9d174d" font-size="12">Complex task</text>
  <text class="dim" x="475" y="254" text-anchor="middle">(implementation)</text>
  <text class="step" x="390" y="280">Create LoreTask CR</text>
  <text class="step" x="390" y="298">Controller spawns Job</text>
  <text class="step" x="390" y="316">Clone, Claude Code, push</text>

  <!-- Both converge -->
  <line class="conn" x1="225" y1="332" x2="225" y2="360" marker-end=""/>
  <line class="conn" x1="475" y1="332" x2="475" y2="360" marker-end=""/>
  <line stroke="#64748b" stroke-width="1.5" x1="225" y1="360" x2="475" y2="360"/>
  <line class="conn" x1="340" y1="360" x2="340" y2="390"/>

  <!-- Watcher -->
  <rect class="box" x="210" y="390" width="260" height="36" fill="#f0fdf4" stroke="#86efac"/>
  <text class="step" x="340" y="413" text-anchor="middle" font-weight="600" fill="#166534">Watcher creates PR</text>

  <line class="conn" x1="340" y1="426" x2="340" y2="458" marker-end=""/>

  <!-- PR result -->
  <rect class="box" x="200" y="458" width="280" height="36" fill="#ecfdf5" stroke="#34d399"/>
  <text class="label" x="340" y="481" text-anchor="middle" fill="#065f46">PR appears on target repo</text>
</svg>