name: Build and push Claude Runner

on:
  push:
    branches: [main]
    paths:
      - 'docker/claude-runner/**'
      - 'mcp-server/src/repo-validation.ts'
      - 'mcp-server/src/repo-validation-cli.ts'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: re-cinq/lore-claude-runner

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy validation source into Docker context
        run: |
          cp mcp-server/src/repo-validation.ts docker/claude-runner/validation/src/
          cp mcp-server/src/repo-validation-cli.ts docker/claude-runner/validation/src/

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: docker/claude-runner
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
