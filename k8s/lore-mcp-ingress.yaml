apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lore-mcp-api
  namespace: mcp-servers
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/hostname: LORE_API_HOSTNAME
spec:
  ingressClassName: nginx-ingress
  tls:
    - hosts:
        - LORE_API_HOSTNAME
      secretName: lore-mcp-api-tls
  rules:
    - host: LORE_API_HOSTNAME
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: lore-mcp
                port:
                  number: 3000
          - path: /healthz
            pathType: Exact
            backend:
              service:
                name: lore-mcp
                port:
                  number: 3000
