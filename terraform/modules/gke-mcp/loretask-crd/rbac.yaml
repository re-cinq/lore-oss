apiVersion: v1
kind: ServiceAccount
metadata:
  name: loretask-controller
  namespace: lore-agent
  annotations:
    iam.gke.io/gcp-service-account: loretask-controller@${project_id}.iam.gserviceaccount.com
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: loretask-controller
rules:
  - apiGroups:
      - lore.re-cinq.com
    resources:
      - loretasks
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
  - apiGroups:
      - lore.re-cinq.com
    resources:
      - loretasks/status
    verbs:
      - get
      - update
      - patch
  - apiGroups:
      - batch
    resources:
      - jobs
    verbs:
      - get
      - list
      - watch
      - create
      - delete
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
  - apiGroups:
      - ""
    resources:
      - pods/log
    verbs:
      - get
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list
      - create
      - update
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: loretask-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: loretask-controller
subjects:
  - kind: ServiceAccount
    name: loretask-controller
    namespace: lore-agent
