apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: loretask-agent
rules:
  - apiGroups: ["lore.re-cinq.com"]
    resources: ["loretasks"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["lore.re-cinq.com"]
    resources: ["loretasks/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: loretask-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: loretask-agent
subjects:
  - kind: ServiceAccount
    name: lore-agent
    namespace: lore-agent
