apiVersion: apps/v1
kind: Deployment
metadata:
  name: loretask-controller
  namespace: lore-agent
  labels:
    app: loretask-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loretask-controller
  template:
    metadata:
      labels:
        app: loretask-controller
      annotations:
        iam.gke.io/gcp-service-account: loretask-controller@${project_id}.iam.gserviceaccount.com
    spec:
      serviceAccountName: loretask-controller
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: controller
          image: ghcr.io/re-cinq/lore-agent:latest
          imagePullPolicy: Always
          command:
            - node
            - dist/loretask-controller-main.js
          env:
            - name: NAMESPACE
              value: lore-agent
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: lore-agent-anthropic-key
                  key: anthropic-api-key
            - name: GITHUB_APP_ID
              valueFrom:
                secretKeyRef:
                  name: lore-agent-github-app
                  key: app-id
            - name: GITHUB_APP_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: lore-agent-github-app
                  key: private-key
            - name: GITHUB_APP_INSTALLATION_ID
              valueFrom:
                secretKeyRef:
                  name: lore-agent-github-app
                  key: installation-id
            - name: LORE_LOG_BUCKET
              value: lore-task-logs-${project_id}
            - name: LORE_INGEST_URL
              value: ${lore_api_url}
          ports:
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 250m
              memory: 512Mi
