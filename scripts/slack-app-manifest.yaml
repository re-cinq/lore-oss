_metadata:
  major_version: 1
  minor_version: 1
display_information:
  name: Lore
  description: Shared context infrastructure for Claude Code agents
  background_color: "#1a1a2e"
features:
  bot_user:
    display_name: Lore
    always_online: true
  slash_commands:
    - command: /lore
      url: https://YOUR_LORE_API_URL/api/webhook/slack
      description: Create a task for Lore agents
      usage_hint: "[task_type] description"
      should_escape: false
oauth_config:
  scopes:
    bot:
      - chat:write
      - commands
settings:
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
